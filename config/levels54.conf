CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Fix BLE freeze on mouse click: enable experimental BLE on central side
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=y

# Increase mouse report queue from default 1 to prevent stalls
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=8
